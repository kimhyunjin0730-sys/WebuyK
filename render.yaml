# Render blueprint for the WeBuyK NestJS API.
# Web (Next.js) stays on Vercel; this file deploys only apps/api.
#
# After pushing this file, go to Render → New → Blueprint, point at this repo,
# then fill in the env vars marked `sync: false` in the dashboard.

services:
  - type: web
    name: wbk-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/products
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: WEB_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: KAKAO_CLIENT_ID
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
